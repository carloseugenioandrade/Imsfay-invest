# Blueprint de deploy do backend Imsfay Invest no Render.
# No Render: New + -> Blueprint -> selecione este repositorio.
# O banco fica no Supabase: cole a connection string em DATABASE_URL no painel.
services:
  - type: web
    name: imsfay-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      # Cole a URI do Supabase (Project Settings -> Database -> Connection string).
      # Use a Session pooler ou a conexao direta (porta 5432).
      - key: DATABASE_URL
        sync: false
      # Defina com a URL do seu site Vercel.
      # Ex.: https://imsfay-invest.vercel.app,http://localhost:5173
      - key: CORS_ORIGINS
        sync: false
      - key: ENABLE_SCHEDULER
        value: "false"
